# Fine-tune on the standard English LJSpeech-1.1 dataset (single speaker, ~24h),
# targeting the 6-layer English model (~90M, no 24-layer teacher ships for English).
# Download: see training/README.md "LJSpeech (English)" section.
# Run: conda run -n pocket-tts python -m training.train fit --config training/configs/ljspeech_english.yaml
seed_everything: 42

trainer:
  accelerator: gpu
  devices: 1
  precision: bf16-mixed
  max_steps: 5000
  # Effective batch = micro-batch. 480 (60x8) burned ~5 epochs per optimizer
  # step for no measurable gain; updates/hour is the bottleneck here.
  accumulate_grad_batches: 2
  gradient_clip_val: 1.0
  # NOTE: counts micro-batches; with accumulate=1 they equal optimizer steps.
  val_check_interval: 250
  check_val_every_n_epoch: null
  limit_val_batches: 25
  log_every_n_steps: 10
  num_sanity_val_steps: 1
  logger:
    - class_path: lightning.pytorch.loggers.TensorBoardLogger
      init_args:
        save_dir: ./checkpoints/tensorboard
        name: ljspeech_english
    - class_path: lightning.pytorch.loggers.WandbLogger
      init_args:
        project: pocket-tts
        name: ljspeech_english
        save_dir: ./checkpoints/tensorboard
  callbacks:
    - class_path: lightning.pytorch.callbacks.ModelCheckpoint
      init_args:
        dirpath: ./checkpoints/ljspeech_english
        filename: "step{step}-fm{val/mse_fm:.4f}"
        auto_insert_metric_name: false
        # Raw FM error: val/loss_total is dominated by the adaptive-weighted
        # LSD term, which keeps falling even after real quality degrades.
        monitor: val/mse_fm
        mode: min
        save_top_k: 2
        save_last: true
    - class_path: lightning.pytorch.callbacks.EarlyStopping
      init_args:
        monitor: val/mse_fm
        mode: min
        patience: 3
        # Without this, asymptotic ~0.001 improvements reset the patience and
        # the run never stops on a plateau (seen in the 2026-07-10 run).
        min_delta: 0.003
    - class_path: lightning.pytorch.callbacks.LearningRateMonitor

model:
  model_config: english
  pretrained: true
  # Lowered from 3e-5: train/grad_norm crept from ~1.9 to ~3.1 over the
  # 2026-07-10 run with gradient_clip_val=1.0 clipping nearly every step —
  # a sign the effective step size was too large for this 6-layer model.
  lr: 1.0e-5
  warmup_steps: 200
  head_batch_multiplier: 8
  fm_fraction: 0.75
  # Disabled to isolate a suspected cause of the 2026-07-10 instability: w_fm/
  # w_lsd drifted increasingly negative (-0.89/-1.80, never hit the +-4 clamp)
  # while val/mse_fm plateaued then rose (0.40 -> 0.50) and grad_norm climbed
  # — consistent with the learned exp(-w) amplification pushing updates too
  # large for this config even though it never saturated the clamp. Re-enable
  # once a clean run confirms mse_fm converges without it.
  adaptive_weighting: false
  text_dropout: 0.15
  voice_prompt_prob: 0.5
  # Light EOS training so the head tracks the drifting backbone: with the head
  # frozen (0.0), eos_logit_true degraded past the -4.0 deployment threshold by
  # step ~650 (2026-07-10 run) — the exported model would not stop speaking.
  # Do NOT restore the pretrained out_eos.* at export when this is > 0.
  eos_weight: 0.05
  activation_checkpointing: false
  val_voice_prompt: /media/fred/FRED5TB/DATASETS/LJSpeech-1.1/wavs/LJ001-0001.wav
  val_sample_texts:
    - "The quick brown fox jumps over the lazy dog."
    - "Artificial intelligence is transforming speech synthesis."

data:
  source: brspeech  # generic LJSpeech-format loader; name predates this English use case
  brspeech_root: /media/fred/FRED5TB/DATASETS/LJSpeech-1.1
  tokenizer_path: hf://kyutai/pocket-tts-without-voice-cloning/languages/english/tokenizer.model@d29db7978e464fb90cb3359ee0c69a273b9142cc
  # Sized for the 24 GB card this config actually runs on (ceia4090); on the
  # local 12 GB RTX 3060 use batch_size 4 + accumulate_grad_batches 8.
  batch_size: 15
  num_workers: 4
  min_duration: 1.0
  max_duration: 15.0
  val_fraction: 0.01
