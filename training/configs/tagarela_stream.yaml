# Streaming fine-tune on freds0/TAGARELA (~9k h pt-BR podcasts, 16 kHz, CC BY-NC-SA)
# mixed 80/20 with local BRSpeech-LN to keep some full-band (22.05 kHz) audio.
# No bulk download: parquet shards are streamed from the HF Hub.
# Run: conda run -n pocket-tts python -m training.train fit --config training/configs/tagarela_stream.yaml
seed_everything: 42

trainer:
  accelerator: gpu
  devices: 1
  precision: bf16-mixed
  max_steps: 50000
  accumulate_grad_batches: 16     # micro-batch 4 -> effective batch 64
  gradient_clip_val: 1.0
  # NOTE: counts micro-batches, not optimizer steps (8000 batches = 500 opt steps)
  val_check_interval: 8000
  check_val_every_n_epoch: null
  limit_val_batches: 25
  log_every_n_steps: 25
  num_sanity_val_steps: 1
  logger:
    class_path: lightning.pytorch.loggers.TensorBoardLogger
    init_args:
      save_dir: /media/fred/FRED5TB/pocket-tts-training/logs
      name: tagarela_stream
  callbacks:
    - class_path: lightning.pytorch.callbacks.ModelCheckpoint
      init_args:
        dirpath: /media/fred/FRED5TB/pocket-tts-training/checkpoints/tagarela_stream
        filename: "step{step}-val{val/loss_total:.3f}"
        auto_insert_metric_name: false
        monitor: val/loss_total
        mode: min
        save_top_k: 3
        save_last: true
        every_n_train_steps: 1000
    - class_path: lightning.pytorch.callbacks.LearningRateMonitor

model:
  model_config: portuguese_24l
  pretrained: true
  lr: 3.0e-5
  warmup_steps: 1000
  head_batch_multiplier: 8
  fm_fraction: 0.75
  adaptive_weighting: true
  text_dropout: 0.15
  voice_prompt_prob: 0.5
  # Gentle EOS training; see brspeech_validate.yaml note about EOS calibration.
  eos_weight: 0.1
  activation_checkpointing: false
  val_voice_prompt: /media/fred/FRED5TB/DATASETS/BRSpeech-LN/wavs/2961_10229_000000-0001.wav
  val_sample_texts:
    - "O rato roeu a roupa do rei de Roma."
    - "A inteligência artificial está transformando a síntese de voz em português."

data:
  source: mix
  brspeech_root: /media/fred/FRED5TB/DATASETS/BRSpeech-LN
  brspeech_prob: 0.2
  tokenizer_path: hf://kyutai/pocket-tts-without-voice-cloning/languages/portuguese_24l/tokenizer.model@d29db7978e464fb90cb3359ee0c69a273b9142cc
  batch_size: 4
  num_workers: 2
  min_duration: 2.0
  max_duration: 18.0
  shuffle_buffer: 1000
